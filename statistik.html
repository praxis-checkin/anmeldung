<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistik – Gemeinschaftspraxis Wetzel</title>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBBhn1qmZOKi2v2tUTFlSvUI8IBLyZth3c",
      authDomain: "patientenanmeldung.firebaseapp.com",
      projectId: "patientenanmeldung",
      storageBucket: "patientenanmeldung.firebasestorage.app",
      messagingSenderId: "244769727634",
      appId: "1:244769727634:web:ad8a408e3cf351b8a94f8b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:  #0d2d4a;
      --blue-mid:   #1a3a5c;
      --blue-light: #e8f0f7;
      --accent:     #2e7db8;
      --green:      #1a9e6e;
      --green-light:#e6f7f1;
      --amber:      #d97706;
      --amber-light:#fef3c7;
      --purple:     #7c3aed;
      --purple-light:#ede9fe;
      --rose:       #e11d48;
      --rose-light: #ffe4e6;
      --bg:         #f0f4f8;
      --surface:    #ffffff;
      --border:     rgba(0,0,0,0.08);
      --text:       #1a1a2e;
      --muted:      #6b7280;
      --radius:     12px;
      --radius-lg:  18px;
    }

    html, body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--blue-dark);
      padding: 0 32px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 20;
      box-shadow: 0 2px 12px rgba(13,45,74,0.25);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7);
      text-decoration: none; padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      transition: all .15s;
    }
    .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); }
    .back-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── PAGE TITLE ── */
    .page-title {
      font-size: 26px; font-weight: 700; color: var(--blue-dark);
      margin-bottom: 4px;
    }
    .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    /* ── DATE SELECTOR ── */
    .date-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .date-chip {
      padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
      font-family: 'DM Mono', monospace;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .date-chip:hover { border-color: var(--accent); color: var(--accent); }
    .date-chip.active {
      background: var(--blue-dark); color: #fff; border-color: var(--blue-dark);
      box-shadow: 0 2px 8px rgba(13,45,74,0.25);
    }
    .date-chip.today-chip { border-color: var(--green); color: var(--green); }
    .date-chip.today-chip.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .state-msg svg { width: 40px; height: 40px; stroke: var(--muted); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      margin: 0 auto 12px; display: block; opacity: .4; }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 28px;
    }
    .sum-card {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .sum-label { font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .sum-value { font-size: 36px; font-weight: 700; line-height: 1;
      font-family: 'DM Mono', monospace; }
    .sum-value.c-blue   { color: var(--blue-dark); }
    .sum-value.c-green  { color: var(--green); }
    .sum-value.c-amber  { color: var(--amber); }
    .sum-value.c-purple { color: var(--purple); }
    .sum-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── CHARTS GRID ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .chart-card {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .chart-card.full-width { grid-column: 1 / -1; }
    .chart-title {
      font-size: 14px; font-weight: 700; color: var(--blue-dark);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .chart-title svg { width: 16px; height: 16px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── BAR CHART ── */
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label {
      font-size: 12px; font-weight: 500; color: var(--text);
      min-width: 120px; flex-shrink: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1; height: 20px; background: var(--bg);
      border-radius: 4px; overflow: hidden; position: relative;
    }
    .bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      min-width: 4px;
    }
    .bar-value {
      font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace;
      color: var(--text); min-width: 28px; text-align: right;
    }

    /* ── AGE PYRAMID (horizontal bars) ── */
    .age-chart { display: flex; flex-direction: column; gap: 8px; }
    .age-row { display: flex; align-items: center; gap: 10px; }
    .age-label {
      font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
      color: var(--muted); min-width: 48px; text-align: right; flex-shrink: 0;
    }
    .age-track {
      flex: 1; height: 24px; background: var(--bg);
      border-radius: 6px; overflow: hidden; position: relative;
    }
    .age-fill {
      height: 100%; border-radius: 6px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
      display: flex; align-items: center; padding-left: 8px;
    }
    .age-fill-label {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9);
      font-family: 'DM Mono', monospace;
    }
    .age-value {
      font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
      color: var(--muted); min-width: 24px; text-align: right;
    }

    /* ── TREND SPARKLINE (multi-day view) ── */
    .trend-chart { overflow-x: auto; }
    .trend-inner {
      display: flex; align-items: flex-end; gap: 6px;
      min-width: 400px; height: 100px; padding-bottom: 20px; position: relative;
    }
    .trend-bar-wrap {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; min-width: 30px;
    }
    .trend-bar-wrap:hover .t-bar { opacity: .75; }
    .t-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      background: var(--accent);
      transition: height .4s ease, opacity .15s;
      min-height: 3px;
    }
    .t-label {
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--muted); text-align: center; white-space: nowrap;
    }
    .t-val {
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--text); font-weight: 600;
    }

    /* ── DONUT CHART ── */
    .donut-wrap {
      display: flex; align-items: center; gap: 24px;
    }
    .donut-svg { flex-shrink: 0; }
    .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 13px; color: var(--text); flex: 1; }
    .legend-val { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
    .legend-pct { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

    /* ── KASSENART ── */
    .insurance-list { display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 700px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid  { grid-template-columns: 1fr; }
      .chart-card.full-width { grid-column: auto; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div>
      <div class="header-title">Gemeinschaftspraxis Wetzel</div>
      <div class="header-sub">DSGVO-konforme Anonyme Tagesstatistik</div>
    </div>
  </div>
  <a href="warteliste.html" class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Zur Warteliste
  </a>
</header>

<main class="main">
  <div class="page-title">Statistik</div>
  <div class="page-sub">DSGVO-konforme Anonymisierte Auswertung der Check-in-Daten · Keine Patientennamen gespeichert</div>

  <div class="date-bar" id="date-bar">
    <div class="state-msg" style="padding:8px;text-align:left;">Daten werden geladen …</div>
  </div>

  <div id="content">
    <div class="state-msg">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Bitte wähle oben einen Tag aus.
    </div>
  </div>
</main>

<script>
  // ── Farben ───────────────────────────────────────────────────────────────
  const TYPE_COLORS = {
    akut:          '#e11d48',
    termin:        '#2e7db8',
    rezept:        '#1a9e6e',
    'überweisung': '#7c3aed',
    sonstige:      '#9ca3af'
  };
  const TYPE_LABELS = {
    akut: 'Akutfall', termin: 'Termin',
    rezept: 'Rezeptabholung', 'überweisung': 'Überweisung', sonstige: 'Sonstige'
  };
  const AGE_COLORS = [
    '#bfdbfe','#93c5fd','#60a5fa','#3b82f6',
    '#2563eb','#1d4ed8','#1e40af','#1e3a8a',
    '#172554','#0f172a','#050a14'
  ];

  // ── State ────────────────────────────────────────────────────────────────
  let allStats   = [];   // alle geladenen Statistik-Dokumente
  let activeDate = null; // aktuell angezeigte Datum-ID (z.B. "21-05-2026")

  // ── Firestore laden ───────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const snap = await db.collection('tagesstatistik').orderBy('ts', 'desc').limit(30).get();
      allStats = [];
      snap.forEach(doc => allStats.push({ id: doc.id, ...doc.data() }));
      renderDateBar();
      if (allStats.length > 0) selectDate(allStats[0].id);
      else renderEmpty();
    } catch (e) {
      document.getElementById('content').innerHTML = `
        <div class="state-msg">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Fehler beim Laden der Statistik.<br><small style="margin-top:6px;display:block;">${e.message}</small>
        </div>`;
    }
  }

  function renderEmpty() {
    document.getElementById('date-bar').innerHTML = '<div class="state-msg" style="padding:8px;text-align:left;color:#9ca3af;font-size:13px;">Noch keine Statistikdaten vorhanden. Diese werden täglich um 17:00 Uhr automatisch gespeichert.</div>';
    document.getElementById('content').innerHTML = `
      <div class="state-msg">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Noch keine Tage gespeichert.<br><small style="margin-top:6px;display:block;">Die erste Statistik wird heute um 17:00 Uhr automatisch gespeichert.</small>
      </div>`;
  }

  // ── Datums-Leiste ─────────────────────────────────────────────────────────
  function renderDateBar() {
    if (allStats.length === 0) { renderEmpty(); return; }

    // Heute-Chip (live, aus aktuellen Patienten)
    const todayId = getTodayId();
    const todayExists = allStats.find(s => s.id === todayId);

    let html = '';

    // Gespeicherte Tage
    allStats.forEach(s => {
      const isToday = s.id === todayId;
      html += `<div class="date-chip${isToday ? ' today-chip' : ''}" data-id="${s.id}" onclick="selectDate('${s.id}')">
        ${isToday ? '● Heute · ' : ''}${formatDateId(s.id)}
      </div>`;
    });

    document.getElementById('date-bar').innerHTML = html;
  }

  function getTodayId() {
    return new Date().toLocaleDateString('de-DE', { timeZone: 'Europe/Berlin' })
      .replace(/\./g, '-').split('-').reverse().join('-');
    // TT-MM-JJJJ → JJJJ-MM-TT nein, wir nutzen das gespeicherte Format TT-MM-JJJJ
  }

  function formatDateId(id) {
    // id = "21-05-2026" → "Di., 21.05.2026"
    const parts = id.split('-');
    if (parts.length !== 3) return id;
    const d = new Date(+parts[2], +parts[1] - 1, +parts[0]);
    if (isNaN(d)) return id;
    return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function selectDate(id) {
    activeDate = id;
    // Chips aktualisieren
    document.querySelectorAll('.date-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.id === id);
    });
    const stat = allStats.find(s => s.id === id);
    if (stat) renderDayStats(stat);
  }

  // ── Tagesansicht rendern ──────────────────────────────────────────────────
  function renderDayStats(stat) {
    const content = document.getElementById('content');
    const dateStr = formatDateId(stat.id);
    const erlRate = stat.gesamt > 0 ? Math.round((stat.erledigt / stat.gesamt) * 100) : 0;

    // ── Zusammenfassung ────────────────────────────────────────────────────
    const summaryHtml = `
      <div class="summary-grid">
        <div class="sum-card">
          <div class="sum-label">Check-ins gesamt</div>
          <div class="sum-value c-blue">${stat.gesamt}</div>
          <div class="sum-sub">Patienten am ${dateStr}</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Abgeschlossen</div>
          <div class="sum-value c-green">${stat.erledigt || 0}</div>
          <div class="sum-sub">${erlRate}% Abschlussquote</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Häufigster Typ</div>
          <div class="sum-value c-amber" style="font-size:20px;line-height:1.3;">${getMostCommon(stat.types)}</div>
          <div class="sum-sub">meistgenutzter Check-in</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Häufigste Altersgruppe</div>
          <div class="sum-value c-purple" style="font-size:20px;line-height:1.3;">${getMostCommonAge(stat.ageGroups)}</div>
          <div class="sum-sub">Jahre</div>
        </div>
      </div>`;

    // ── Besuchstypen Donut ─────────────────────────────────────────────────
    const typeDonutHtml = buildDonut(stat.types, TYPE_COLORS, TYPE_LABELS, stat.gesamt);

    // ── Altersgruppen Balken ───────────────────────────────────────────────
    const ageBarHtml = buildAgeChart(stat.ageGroups);

    // ── Kassenart ─────────────────────────────────────────────────────────
    const insHtml = buildInsuranceChart(stat.insurance || {}, stat.gesamt);

    content.innerHTML = `
      ${summaryHtml}
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">
            <svg viewBox="0 0 24 24"><path d="M21.21 15.89A10 10 0 118 2.83"/><path d="M22 12A10 10 0 0012 2v10z"/></svg>
            Besuchstypen
          </div>
          ${typeDonutHtml}
        </div>
        <div class="chart-card">
          <div class="chart-title">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Kassenart
          </div>
          ${insHtml}
        </div>
        <div class="chart-card full-width">
          <div class="chart-title">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            Altersverteilung (10-Jahres-Gruppen)
          </div>
          ${ageBarHtml}
        </div>
      </div>`;

    // Trend-Chart nur wenn mehrere Tage
    if (allStats.length > 1) {
      const trendHtml = buildTrendChart();
      content.innerHTML += `
        <div style="margin-top:18px;">
          <div class="chart-card full-width">
            <div class="chart-title">
              <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Verlauf der letzten ${allStats.length} Tage
            </div>
            ${trendHtml}
          </div>
        </div>`;
    }
  }

  // ── Donut Chart ────────────────────────────────────────────────────────────
  function buildDonut(types, colors, labels, total) {
    const entries = Object.entries(types)
      .filter(([,v]) => v > 0)
      .sort(([,a],[,b]) => b - a);

    if (entries.length === 0) return '<div style="color:var(--muted);font-size:13px;">Keine Daten</div>';

    const r = 52, cx = 64, cy = 64, stroke = 20;
    const circ = 2 * Math.PI * r;
    let offset = 0;
    let segments = '';

    entries.forEach(([key, val]) => {
      const pct = val / total;
      const dash = pct * circ;
      const gap  = circ - dash;
      segments += `<circle
        cx="${cx}" cy="${cy}" r="${r}"
        fill="none"
        stroke="${colors[key] || '#9ca3af'}"
        stroke-width="${stroke}"
        stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
        stroke-dashoffset="${(-offset).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"
      />`;
      offset += dash;
    });

    const legendHtml = entries.map(([key, val]) => `
      <div class="legend-row">
        <div class="legend-dot" style="background:${colors[key] || '#9ca3af'}"></div>
        <div class="legend-label">${labels[key] || key}</div>
        <div class="legend-val">${val}</div>
        <div class="legend-pct">${Math.round(val/total*100)}%</div>
      </div>`).join('');

    return `<div class="donut-wrap">
      <svg class="donut-svg" width="128" height="128" viewBox="0 0 128 128">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f0f4f8" stroke-width="${stroke}"/>
        ${segments}
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
          font-size="20" font-weight="700" fill="#1a1a2e" font-family="DM Mono,monospace">${total}</text>
        <text x="${cx}" y="${cy+16}" text-anchor="middle" dominant-baseline="middle"
          font-size="9" fill="#6b7280" font-family="DM Sans,sans-serif">gesamt</text>
      </svg>
      <div class="donut-legend">${legendHtml}</div>
    </div>`;
  }

  // ── Altersgruppen-Chart ────────────────────────────────────────────────────
  function buildAgeChart(ageGroups) {
    if (!ageGroups || Object.keys(ageGroups).length === 0)
      return '<div style="color:var(--muted);font-size:13px;">Keine Altersangaben vorhanden</div>';

    // Alle Gruppen 0–9, 10–19, … 90–99, (100+)
    const allGroups = ['0–9','10–19','20–29','30–39','40–49','50–59','60–69','70–79','80–89','90–99','unbekannt'];
    const data = allGroups.map(g => ({ label: g, val: ageGroups[g] || 0 })).filter(d => d.val > 0 || d.label !== 'unbekannt');
    const max  = Math.max(...data.map(d => d.val), 1);

    let html = '<div class="age-chart">';
    data.forEach((d, i) => {
      const pct  = Math.round((d.val / max) * 100);
      const col  = d.label === 'unbekannt' ? '#d1d5db' : AGE_COLORS[Math.min(i, AGE_COLORS.length - 1)];
      const show = d.val > 0;
      html += `
        <div class="age-row">
          <div class="age-label">${d.label === 'unbekannt' ? '?' : d.label}</div>
          <div class="age-track">
            <div class="age-fill" style="width:${show ? Math.max(pct,4) : 0}%;background:${col};">
              ${show && pct > 15 ? `<span class="age-fill-label">${d.val}</span>` : ''}
            </div>
          </div>
          <div class="age-value">${d.val > 0 ? d.val : '—'}</div>
        </div>`;
    });
    html += '</div>';
    return html;
  }

  // ── Kassenart-Chart ────────────────────────────────────────────────────────
  function buildInsuranceChart(insurance, total) {
    const entries = Object.entries(insurance).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
    if (entries.length === 0) return '<div style="color:var(--muted);font-size:13px;">Keine Angaben</div>';

    const max = Math.max(...entries.map(([,v])=>v), 1);
    const insColors = ['#2e7db8','#1a9e6e','#7c3aed','#d97706','#e11d48','#0891b2','#65a30d'];

    let html = '<div class="bar-chart">';
    entries.forEach(([key, val], i) => {
      const pct = Math.round((val / max) * 100);
      html += `
        <div class="bar-row">
          <div class="bar-label" title="${key}">${key}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(pct,3)}%;background:${insColors[i % insColors.length]};"></div>
          </div>
          <div class="bar-value">${val}</div>
        </div>`;
    });
    html += '</div>';
    return html;
  }

  // ── Verlauf-Chart ─────────────────────────────────────────────────────────
  function buildTrendChart() {
    const sorted = [...allStats].sort((a,b) => a.ts - b.ts);
    const maxVal = Math.max(...sorted.map(s => s.gesamt), 1);
    const BAR_HEIGHT = 72;

    let html = '<div class="trend-chart"><div class="trend-inner">';
    sorted.forEach(s => {
      const h  = Math.max(Math.round((s.gesamt / maxVal) * BAR_HEIGHT), 3);
      const isActive = s.id === activeDate;
      html += `
        <div class="trend-bar-wrap" onclick="selectDate('${s.id}')">
          <div class="t-val">${s.gesamt}</div>
          <div class="t-bar" style="height:${h}px;background:${isActive ? '#0d2d4a' : '#2e7db8'};"></div>
          <div class="t-label">${formatDateShort(s.id)}</div>
        </div>`;
    });
    html += '</div></div>';
    return html;
  }

  function formatDateShort(id) {
    const parts = id.split('-');
    if (parts.length !== 3) return id;
    return `${parts[0]}.${parts[1]}`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getMostCommon(obj) {
    if (!obj) return '—';
    const [key] = Object.entries(obj).sort(([,a],[,b]) => b - a)[0] || [];
    return key ? (TYPE_LABELS[key] || key) : '—';
  }
  function getMostCommonAge(obj) {
    if (!obj) return '—';
    const filtered = Object.entries(obj).filter(([k]) => k !== 'unbekannt');
    if (!filtered.length) return '—';
    const [key] = filtered.sort(([,a],[,b]) => b - a)[0] || [];
    return key || '—';
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadStats();
</script>
